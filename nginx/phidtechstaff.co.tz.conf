upstream boms_app {
    server 127.0.0.1:3002;
    keepalive 64;
}

# HTTP - serves site now, certbot will add HTTPS block automatically
server {
    listen 80;
    server_name phidtechstaff.co.tz www.phidtechstaff.co.tz;

    # Logs - isolated per site
    access_log /var/log/nginx/phidtechstaff.access.log;
    error_log  /var/log/nginx/phidtechstaff.error.log;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://boms_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    location /_next/static/ {
        proxy_pass       http://boms_app;
        proxy_set_header Host $host;
        add_header       Cache-Control "public, max-age=31536000, immutable";
        access_log       off;
    }

    location /public/ {
        proxy_pass  http://boms_app;
        add_header  Cache-Control "public, max-age=86400";
        access_log  off;
    }
}
