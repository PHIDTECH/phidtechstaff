upstream boms_app {
    server 127.0.0.1:3002;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name phidtechstaff.co.tz www.phidtechstaff.co.tz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name phidtechstaff.co.tz www.phidtechstaff.co.tz;

    # SSL Certificates (managed by Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/phidtechstaff.co.tz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phidtechstaff.co.tz/privkey.pem;

    # SSL hardening
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:boms_SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            SAMEORIGIN always;
    add_header X-Content-Type-Options     nosniff always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_min_length 1024;

    # Upload limit
    client_max_body_size 50M;

    # Logs - isolated per site
    access_log /var/log/nginx/phidtechstaff.access.log;
    error_log  /var/log/nginx/phidtechstaff.error.log;

    # Proxy to BOMS Next.js app
    location / {
        proxy_pass         http://boms_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Next.js static assets – long cache
    location /_next/static/ {
        proxy_pass       http://boms_app;
        proxy_set_header Host $host;
        add_header       Cache-Control "public, max-age=31536000, immutable";
        access_log       off;
    }

    # Public folder
    location /public/ {
        proxy_pass  http://boms_app;
        add_header  Cache-Control "public, max-age=86400";
        access_log  off;
    }
}
