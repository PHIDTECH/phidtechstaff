name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to phidtechstaff.co.tz
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: phidtechstaff.co.tz
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/boms
            echo "==> Pulling latest code..."
            git pull origin main
            echo "==> Installing dependencies..."
            npm install --legacy-peer-deps
            echo "==> Building app..."
            npm run build
            echo "==> Restarting app..."
            pm2 restart all
            echo "==> Done!"
