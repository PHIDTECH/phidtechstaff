version: "3.8"

services:
  boms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boms-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env.production
    networks:
      - boms-network

  nginx:
    image: nginx:alpine
    container_name: boms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - boms
    networks:
      - boms-network

networks:
  boms-network:
    driver: bridge

volumes:
  nginx-logs:
